<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>@counter-style rule</title>
    <style>
      @counter-style emoji {
        system: symbolic;
        symbols: "1️⃣" "2️⃣" "3️⃣";
      }
      ol {
        /* not working yet */
        /* list-style-type: emoji; */
        list-style: none;
        counter-reset: li 0;
      }
      li {
        counter-increment: li;
      }
      li::before {
        content: counter(li, emoji) ". ";
      }
    </style>
  </head>
  <body>
    <h1>@counter-style rule</h1>
    <ol>
      <li>One</li>
      <li>Two</li>
      <li>Three</li>
    </ol>
  </body>
</html>
